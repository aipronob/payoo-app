<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

  <!-- Daisy + tailwind Ui -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Fontawsome  -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <style>
    * {
      font-family: "Outfit", sans-serif;
    }
  </style>

</head>

<body class="min-h-screen max-w-md bg-base-300 mx-auto " >
  <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200">
    <section class="w-11/12  mx-auto py-3 flex justify-between items-center">
      <div class="left flex gap-1 ">
          <div class="logo w-[60px]">
            <img src="assets/logo.png" alt="">
          </div>
          <div class="balance-info">
            <!-- iMPORTANT -->
            <h2 class="text-2xl font-bold">$ <span id="balance">45000</span></h2>
            <p class="text-neutral/50">Available Balance</p>
          </div>
      </div>
      <div class="right">
        <a href="./index.html" class="btn btn-soft"><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
      </div>

    </section>

  </header>

  <section id="cashout" class="w-11/12 mx-auto space-y-5">
    <h2 class="text-2xl">Welcome to Pay<span class="text-secondary">oo</span></h2>
    <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>
    
    <div class="buttons grid grid-cols-2 gap-3">
      <button class="btn flex-col h-full">
        <img src="assets/opt-1.png" alt="">
        <p>add money</p>
      </button>

            <button class="btn flex-col h-full">
        <img src="assets/opt-2.png" alt="">
        <p>Cash Out</p>
      </button>

            <button class="btn flex-col h-full">
        <img src="assets/opt-3.png" alt="">
        <p>Send Money</p>
      </button>

            <button class="btn flex-col h-full">
        <img src="assets/opt-4.png" alt="">
        <p>Transctions</p>
      </button>
    </div>
  </section>

  <section id="cashout" class="w-11/12 mx-auto py-5">
    <h2 class="text-xl font-bold mb-5">Cashout</h2>
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold">Agent Number</label>
          <input id="input-number" maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 w-full shrink-0 shadow mx-auto"  placeholder="Agent Number" />
          <!-- value="01726001234"  -->
          <br>

          <label class="label  text-neutral font-bold">Amount</label>
          <input id="input-amount" maxlength="4" minlength="4" type="number" class="input rounded-full bg-base-200 w-full shrink-0 shadow mx-auto " value="1000000" placeholder="amount" />
          <input id="cashout-pin" maxlength="4" minlength="4" type="password" class="input rounded-full bg-base-200 w-full shrink-0 shadow mx-auto" value="1234" placeholder="Enter 4 digit pin" />
              <button id="cashout-btn" class="btn btn-primary mt-4 rounded-full">Withdraw the money</button>
        </fieldset>
      </div>
    </div>
  </div>
  </section>

  <section id="add-money"  class="w-11/12 mx-auto py-5">
   <!-- //////////////////////////////  -->
    <h2 class="text-xl font-bold mb-5">Add Money</h2>



    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl mx-auto rounded-2xl">
      <div class="card-body">
        <label class="label  text-neutral font-bold">Select Bank</label>
        <select id="add-money-bank" class="select w-full max-w-sm shrink-0 shadow-2xl mx-auto rounded-2xl">
          <option disabled selected>Select Bank</option>
          <option value="City Bank">City Bank</option>
          <option value="DBBL">DBBL</option>
          <option value="IBBL">IBBL</option>
        </select>
        <br>

        <fieldset class="fieldset">
          <label class="label text-neutral font-bold">Bank Account Number</label>
          <input id="input-number" maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 w-full shrink-0 shadow mx-auto"  placeholder="Bank acc No." />
             <br>

          <label class="label  text-neutral font-bold">Amount to Add</label>
          <input id="input-amount" maxlength="4" minlength="4" type="number" class="input rounded-full bg-base-200 w-full shrink-0 shadow mx-auto " placeholder="Enter amount to Add" />
          <input id="add-pin" maxlength="4" minlength="4" type="password" class="input rounded-full bg-base-200 w-full shrink-0 shadow mx-auto" value="1234" placeholder="Enter 4 digit pin" />
              <button id="add-money-btn" class="btn btn-primary mt-4 rounded-full">Withdraw the money</button>
        </fieldset>
      </div>
    </div>
  </div>
    
</section>


<script src="./script/machine.js"></script>
<script src="./script/cashout.js"></script>





</body>
</html>
